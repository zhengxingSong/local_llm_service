# Qwen AI Service - Default Configuration

server:
  host: "0.0.0.0"
  port: 8000
  cors:
    origin: "*"
    credentials: true

llama:
  baseUrl: "${LLAMA_BASE_URL:-http://llama-cpp:8001}"
  timeout: 300000  # 5 minutes
  maxRetries: 3
  retryDelay: 1000

models:
  directory: "D:\\LLM Model\\Qwen-3.5\\models\\gguf"
  default: "Qwen3.5-9B-Q4_K_M.gguf"
  autoUnload: false
  preload: []

tools:
  enabled: true
  builtin:
    - weather
    - search
    - filesystem
  custom: []

mcp:
  enabled: true
  servers:
    - name: "filesystem"
      url: "http://localhost:3000"
      enabled: false

logging:
  level: "info"  # error, warn, info, debug
  file: "./logs/service.log"
  console: true
  maxSize: "100M"
  maxFiles: 10
  datePattern: "YYYY-MM-DD"

security:
  apiKey:
    enabled: false
    header: "x-api-key"
    keys: []
  rateLimit:
    enabled: true
    requestsPerMinute: 60
    burst: 100

performance:
  concurrentLimit: 5
  queueSize: 100
  timeout: 120000  # 2 minutes

multimodal:
  enabled: true
  image:
    maxSize: 10485760  # 10MB in bytes
    maxWidth: 2048
    maxHeight: 2048
    allowedFormats:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
    timeout: 30000  # 30 seconds for image download
